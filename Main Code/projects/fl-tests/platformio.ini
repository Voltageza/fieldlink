; FieldLink native unit tests.
; Runs on the host (PC) — no ESP32 needed.
;
;   pio test -e native
;
; Tests cover pure-logic modules in FieldLinkCore that have no hardware
; dependencies (currently: fl_protection). Meter-adjacent and portal-
; adjacent code cannot be tested here and requires the ESP32 + SIM_MODE
; or a real site visit.
;
; Windows note: this env needs a host C++ compiler on PATH (gcc/g++ from
; MinGW-w64, or Microsoft build tools). If `pio test -e native` can't find
; a compiler, install MSYS2 / MinGW-w64 and re-try.

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -Wall
    -Wextra
    -I../../shared/FieldLinkCore/src
; src/ contains a thin shim that #includes fl_protection.cpp so the
; protection implementation gets linked into the test binary. The rest of
; FieldLinkCore depends on Arduino.h and is deliberately not pulled in.
test_build_src = yes
